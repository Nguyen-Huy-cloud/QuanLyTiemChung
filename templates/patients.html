{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm border-0 mb-4">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0">QUẢN LÝ HỒ SƠ BỆNH NHÂN</h5>
        <button class="btn btn-light btn-sm fw-bold" data-bs-toggle="collapse" data-bs-target="#formThem">
            <i class="fas fa-plus me-1"></i> Thêm mới
        </button>
    </div>
    
    <div class="collapse p-4 border-bottom bg-white" id="formThem">
        <form method="POST" class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Họ tên</label>
                <input type="text" name="fullname" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Ngày sinh</label>
                <input type="date" name="dob" class="form-control" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Giới tính</label>
                <select name="gender" class="form-select">
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Số điện thoại</label>
                <input type="text" name="phone" class="form-control">
            </div>
            <div class="col-md-10">
                <label class="form-label">Địa chỉ</label>
                <input type="text" name="address" class="form-control">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">Lưu hồ sơ</button>
            </div>
        </form>
    </div>

    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Họ và Tên</th>
                        <th>Ngày sinh</th>
                        <th>SĐT</th>
                        <th>Địa chỉ</th>
                        <th class="text-center">Thao tác</th> </tr>
                    </tr>
                </thead>
                <tbody>
                    {% for p in patients %}
                    <tr>
                        <td>#{{ p.id }}</td>
                        <td><strong>{{ p.fullname }}</strong></td>
                        <td>{{ p.dob.strftime('%d/%m/%Y') if p.dob else '' }}</td>
                        <td>{{ p.phone }}</td>
                        <td><small>{{ p.address }}</small></td>
                        <td class="text-center">
                            <a href="{{ url_for('patient_history', patient_id=p.id) }}" class="btn btn-info btn-sm text-white">
                                <i class="fas fa-eye"></i> Xem lịch sử
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
