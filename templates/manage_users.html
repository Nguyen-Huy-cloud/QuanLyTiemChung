{% extends 'base.html' %}
{% block content %}
<h3 class="text-primary fw-bold mb-4"><i class="fas fa-user-shield me-2"></i>QUẢN LÝ NHÂN VIÊN</h3>

<div class="row">
    <div class="col-md-4">
        <div class="card p-4 border-0 shadow-sm mb-4">
            <h5 class="text-primary mb-3">Thêm nhân viên mới</h5>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu tạm thời</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Chức vụ / Quyền</label>
                    <select name="role_id" class="form-select">
                        {% for r in roles %}
                        <option value="{{ r.id }}">{{ r.role_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">CẤP TÀI KHOẢN</button>
            </form>
        </div>
    </div>
    
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Tên đăng nhập</th>
                        <th>Vai trò</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in users %}
                    <tr>
                        <td>#{{ u.id }}</td>
                        <td class="fw-bold">{{ u.username }}</td>
                        <td>
                            {% if u.role.role_name == 'Admin' %}
                            <span class="badge bg-danger">Quản trị viên</span>
                            {% else %}
                            <span class="badge bg-info text-dark">{{ u.role.role_name }}</span>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
